<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pizarra DIY - Corregida</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #app { display: flex; flex-direction: column; height: 100vh; width: 100%; background: #1a1a2e; }
    #toolbar {
      display: flex; align-items: center; flex-wrap: wrap;
      padding: 8px 12px; background: #16213e; border-bottom: 0.5px solid #0f3460;
      flex-shrink: 0; gap: 8px; user-select: none; touch-action: none;
    }
    #toolbar-title { color: #e0e0ff; font-size: 14px; font-weight: 500; font-family: sans-serif; letter-spacing: 1px; }
    #saveStatus { color: #a78bfa; font-size: 11px; font-family: sans-serif; }
    .tb-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tb-btn {
      background: #0f3460; color: #e0e0ff; border: 0.5px solid #533483;
      border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: sans-serif; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; min-height: 36px; user-select: none;
    }
    .tb-btn:active { background: #533483; }
    .tb-btn.active { background: #533483; border-color: #a78bfa; }
    .tb-btn.danger { background: #3d0c0c; border-color: #e74c3c; color: #ffaaaa; }
    .tb-btn.ocr-btn { background: #0d3d2e; border-color: #1abc9c; color: #aafce8; }
    .tb-btn.page-btn { font-size: 16px; padding: 8px 12px; }
    .sep { width: 0.5px; height: 24px; background: #0f3460; flex-shrink: 0; }
    #pageIndicator { color: #a78bfa; font-size: 13px; font-family: sans-serif; font-weight: 600; min-width: 44px; text-align: center; }
    .size-dot {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; background: #0f3460;
      border: 0.5px solid #533483; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; flex-shrink: 0;
    }
    .size-dot.active { border-color: #a78bfa; background: #533483; }
    .dot-inner { background: #e0e0ff; border-radius: 50%; pointer-events: none; }
    #colorPicker {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid #533483;
      padding: 0; cursor: pointer; flex-shrink: 0;
    }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; touch-action: none; }
    #bgLayer { position: absolute; inset: 0; pointer-events: none; }
    #drawCanvas { position: absolute; inset: 0; touch-action: none; }
    #pageFlash {
      position: absolute; inset: 0; background: white; opacity: 0;
      pointer-events: none; transition: opacity 0.15s; z-index: 10;
    }
    #pageFlash.flash { opacity: 0.4; }
    /* OCR Modal */
    #ocrModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 100; align-items: center; justify-content: center; padding: 16px;
    }
    #ocrModal.open { display: flex; }
    #ocrBox {
      background: #16213e; border: 0.5px solid #533483; border-radius: 12px;
      padding: 20px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px;
    }
    #ocrBox h2 { color: #e0e0ff; font-size: 15px; font-family: sans-serif; font-weight: 500; }
    #ocrStatus { color: #aafce8; font-size: 13px; font-family: sans-serif; }
    #ocrText {
      background: #0f1923; color: #e0e0ff; border: 0.5px solid #533483;
      border-radius: 8px; padding: 12px; font-size: 14px; font-family: sans-serif;
      min-height: 100px; resize: vertical; width: 100%; outline: none;
    }
    .ocr-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="tb-row">
      <span id="toolbar-title">✎ PIZARRA</span>
      <span id="saveStatus">✓ guardado</span>
    </div>
    <div class="tb-row">
      <div class="size-dot active" data-size="3"><div class="dot-inner" style="width:5px;height:5px"></div></div>
      <div class="size-dot" data-size="7"><div class="dot-inner" style="width:9px;height:9px"></div></div>
      <div class="size-dot" data-size="14"><div class="dot-inner" style="width:15px;height:15px"></div></div>
      <input type="color" id="colorPicker" value="#2c2c2a">
      <div class="sep"></div>
      <div class="tb-btn active" data-mode="linea">Línea</div>
      <div class="tb-btn" data-mode="goma">Goma</div>
      <div class="sep"></div>
      <div class="tb-btn" data-bg="lisa">Lisa</div>
      <div class="tb-btn active" data-bg="rayada">Rayada</div>
      <div class="tb-btn" data-bg="penta">♪</div>
      <div class="sep"></div>
      <div class="tb-btn page-btn" id="prevBtn">▲</div>
      <span id="pageIndicator">1 / 1</span>
      <div class="tb-btn page-btn" id="nextBtn">▼</div>
      <div class="tb-btn ocr-btn" id="addPageBtn">+ Pág</div>
      <div class="sep"></div>
      <div class="tb-btn ocr-btn" id="ocrBtn">OCR</div>
      <div class="tb-btn danger" id="clearBtn">Borrar</div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="bgLayer"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div id="pageFlash"></div>
  </div>
</div>

<div id="ocrModal">
  <div id="ocrBox">
    <h2>Texto reconocido</h2>
    <div id="ocrStatus"></div>
    <textarea id="ocrText" placeholder="El texto aparece acá..."></textarea>
    <div class="ocr-actions">
      <div class="tb-btn ocr-btn" id="copyBtn">Copiar</div>
      <div class="tb-btn ocr-btn" id="downloadBtn">Descargar .txt</div>
      <div class="tb-btn danger" id="closeOcrBtn">Cerrar</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ── Referencias ──────────────────────────────────────────────
const bgCanvas   = document.getElementById('bgLayer');
const bgCtx      = bgCanvas.getContext('2d');
const dc         = document.getElementById('drawCanvas');
const ctx        = dc.getContext('2d');
const wrap       = document.getElementById('canvas-wrap');
const pageInd    = document.getElementById('pageIndicator');
const flash      = document.getElementById('pageFlash');
const saveStatus = document.getElementById('saveStatus');

// ── Estado ───────────────────────────────────────────────────
const STORAGE_KEY = 'pizarra_diy_v2';
let currentBg    = 'rayada';
let currentMode  = 'linea';
let currentSize  = 3;
let currentColor = '#2c2c2a';
let pages        = [null];
let currentPage  = 0;
let saveTimer    = null;

// ── Estado de dibujo ─────────────────────────────────────────
let drawing      = false;
let activeId     = null;
let lastX = 0, lastY = 0;

// ── Resize ───────────────────────────────────────────────────
function resizeCanvases() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  if (!w || !h) return;
  const tmp = document.createElement('canvas');
  tmp.width = dc.width; tmp.height = dc.height;
  if (dc.width > 0 && dc.height > 0) tmp.getContext('2d').drawImage(dc, 0, 0);
  dc.width = w; dc.height = h;
  bgCanvas.width = w; bgCanvas.height = h;
  if (tmp.width > 0 && tmp.height > 0) ctx.drawImage(tmp, 0, 0);
  drawBg();
}
window.addEventListener('resize', resizeCanvases);

// ── Fondo ─────────────────────────────────────────────────────
function drawBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);
  bgCtx.fillStyle = '#ecf0f1';
  bgCtx.fillRect(0, 0, w, h);
  if (currentBg === 'lisa') return;
  
  if (currentBg === 'rayada') {
    bgCtx.strokeStyle = '#bdc3c7'; bgCtx.lineWidth = 1;
    for (let y = 40; y < h; y += 40) {
      bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(w, y); bgCtx.stroke();
    }
    return;
  }
  
  if (currentBg === 'penta') {
    bgCtx.strokeStyle = '#95a5a6'; bgCtx.lineWidth = 1;
    // Líneas del pentagrama (5 líneas cada 160px)
    for (let base = 60; base < h; base += 160) {
      for (let i = 0; i < 5; i++) {
        const y = base + i * 12;
        if (y < h) {
          bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(w, y); bgCtx.stroke();
        }
      }
    }
  }
}

// ── Páginas ──────────────────────────────────────────────────
function savePage() { 
  pages[currentPage] = dc.toDataURL(); 
}

function loadPage(idx) {
  ctx.clearRect(0, 0, dc.width, dc.height);
  if (pages[idx] && pages[idx] !== null) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0);
      scheduleSave();
    };
    img.src = pages[idx];
  }
  pageInd.textContent = (idx + 1) + ' / ' + pages.length;
}

function doFlash(cb) {
  flash.classList.add('flash');
  setTimeout(() => { 
    flash.classList.remove('flash'); 
    if (cb) cb();
  }, 150);
}

function goPage(idx) {
  if (idx === currentPage) return;
  savePage();
  doFlash(() => { 
    currentPage = idx; 
    loadPage(currentPage); 
    scheduleSave();
  });
}

document.getElementById('prevBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (currentPage > 0) goPage(currentPage - 1);
});
document.getElementById('nextBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (currentPage < pages.length - 1) goPage(currentPage + 1);
});
document.getElementById('addPageBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  savePage(); 
  pages.push(null);
  doFlash(() => { 
    currentPage = pages.length - 1; 
    loadPage(currentPage); 
    scheduleSave();
  });
});

// ── Persistencia ─────────────────────────────────────────────
function scheduleSave() {
  saveStatus.textContent = '...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    savePage();
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ pages, currentPage, currentBg }));
      saveStatus.textContent = '✓ guardado';
    } catch(e) { 
      saveStatus.textContent = '⚠ sin espacio'; 
    }
  }, 800);
}

function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    pages = d.pages || [null];
    currentPage = d.currentPage || 0;
    if (currentPage >= pages.length) currentPage = pages.length - 1;
    currentBg = d.currentBg || 'rayada';
    document.querySelectorAll('[data-bg]').forEach(b =>
      b.classList.toggle('active', b.dataset.bg === currentBg));
    return true;
  } catch(e) { 
    console.warn("Error loading storage", e);
    return false; 
  }
}

// ── Dibujo ────────────────────────────────────────────────────
function getXY(e) {
  const r = dc.getBoundingClientRect();
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return [clientX - r.left, clientY - r.top];
}

function beginStroke(x, y) {
  drawing = true;
  lastX = x; lastY = y;
  ctx.save();
  ctx.beginPath();
  ctx.globalCompositeOperation = currentMode === 'goma' ? 'destination-out' : 'source-over';
  
  if (currentMode === 'goma') {
    // Para la goma, pintamos un punto inicial
    ctx.arc(x, y, currentSize * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fill();
  } else {
    ctx.arc(x, y, currentSize * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = currentColor;
    ctx.fill();
  }
  ctx.restore();
}

function continueStroke(x, y, pressure = 0.5) {
  if (!drawing) return;
  ctx.save();
  ctx.lineJoin = 'round'; 
  ctx.lineCap = 'round';
  ctx.globalCompositeOperation = currentMode === 'goma' ? 'destination-out' : 'source-over';
  
  let lineWidth;
  if (currentMode === 'goma') {
    lineWidth = currentSize * 2.2;
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    // Presión: entre 0.5 y 2 veces el tamaño base
    const pressureFactor = Math.min(2.0, Math.max(0.5, pressure * 1.5));
    lineWidth = currentSize * pressureFactor;
    ctx.strokeStyle = currentColor;
  }
  
  ctx.lineWidth = lineWidth;
  ctx.beginPath(); 
  ctx.moveTo(lastX, lastY); 
  ctx.lineTo(x, y); 
  ctx.stroke();
  ctx.restore();
  
  lastX = x; 
  lastY = y;
}

function endStroke() {
  drawing = false;
  activeId = null;
  scheduleSave();
}

// Eventos táctiles y ratón unificados
function handlePointerStart(e) {
  e.preventDefault();
  if (drawing) return;
  activeId = e.pointerId || 'touch';
  const [x, y] = getXY(e);
  beginStroke(x, y);
}

function handlePointerMove(e) {
  e.preventDefault();
  if (!drawing) {
    // Si hay botón presionado (lápiz o dedo) y no estamos dibujando, comenzamos
    if (e.buttons === 1 || (e.touches && e.touches.length > 0)) {
      const [x, y] = getXY(e);
      beginStroke(x, y);
      return;
    }
    return;
  }
  
  const [x, y] = getXY(e);
  const pressure = e.pressure !== undefined && e.pressure > 0 ? e.pressure : 0.5;
  continueStroke(x, y, pressure);
}

function handlePointerEnd(e) {
  if (drawing) {
    endStroke();
  }
  activeId = null;
}

// Puntero (ratón y lápiz)
dc.addEventListener('pointerdown', handlePointerStart);
dc.addEventListener('pointermove', handlePointerMove);
dc.addEventListener('pointerup', handlePointerEnd);
dc.addEventListener('pointercancel', handlePointerEnd);

// Touch específico para compatibilidad extra
dc.addEventListener('touchstart', handlePointerStart, { passive: false });
dc.addEventListener('touchmove', handlePointerMove, { passive: false });
dc.addEventListener('touchend', handlePointerEnd);
dc.addEventListener('touchcancel', handlePointerEnd);

// ── Controles toolbar ────────────────────────────────────────
document.querySelectorAll('[data-bg]').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    currentBg = btn.dataset.bg;
    document.querySelectorAll('[data-bg]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawBg(); 
    scheduleSave();
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    currentMode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.querySelectorAll('[data-size]').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    currentSize = parseInt(btn.dataset.size);
    document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('colorPicker').addEventListener('input', e => {
  currentColor = e.target.value;
});

document.getElementById('clearBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  ctx.clearRect(0, 0, dc.width, dc.height);
  pages[currentPage] = null;
  scheduleSave();
});

// ── OCR ──────────────────────────────────────────────────────
const ocrModal  = document.getElementById('ocrModal');
const ocrStatus = document.getElementById('ocrStatus');
const ocrText   = document.getElementById('ocrText');

document.getElementById('ocrBtn').addEventListener('pointerdown', async e => {
  e.stopPropagation();
  ocrModal.classList.add('open');
  ocrText.value = '';
  ocrStatus.textContent = 'Preparando imagen...';
  
  const merged = document.createElement('canvas');
  merged.width = dc.width; 
  merged.height = dc.height;
  const mCtx = merged.getContext('2d');
  mCtx.fillStyle = '#ffffff';
  mCtx.fillRect(0, 0, merged.width, merged.height);
  mCtx.drawImage(dc, 0, 0);
  
  try {
    ocrStatus.textContent = 'Cargando OCR...';
    const worker = await Tesseract.createWorker('spa', 1, {
      logger: m => {
        if (m.status === 'recognizing text')
          ocrStatus.textContent = 'Reconociendo ' + Math.round(m.progress * 100) + '%';
      }
    });
    const { data: { text } } = await worker.recognize(merged);
    await worker.terminate();
    ocrText.value = text.trim() || '(Sin texto reconocido)';
    ocrStatus.textContent = 'Listo ✓';
  } catch(err) { 
    ocrStatus.textContent = 'Error: ' + err.message; 
  }
});

document.getElementById('copyBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  navigator.clipboard.writeText(ocrText.value).then(() => ocrStatus.textContent = '¡Copiado!');
});

document.getElementById('downloadBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ocrText.value], { type: 'text/plain' }));
  a.download = 'pizarra_texto.txt'; 
  a.click();
});

document.getElementById('closeOcrBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  ocrModal.classList.remove('open');
});

// ── Init ─────────────────────────────────────────────────────
resizeCanvases();
const loaded = loadStorage();
drawBg();
if (loaded) {
  loadPage(currentPage);
} else {
  pageInd.textContent = '1 / 1';
}
</script>
</body>
</html>
