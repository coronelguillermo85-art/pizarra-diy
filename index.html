```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizarra Pro Ultra</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  height:100vh;
  background:#1c1c1c;
  font-family:Arial,sans-serif;
}

#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

#toolbar{
  background:#252525;
  border-bottom:1px solid #444;
  padding:8px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.title{
  color:white;
  font-weight:bold;
  margin-right:10px;
}

.btn{
  background:#333;
  color:white;
  border:none;
  border-radius:8px;
  padding:7px 11px;
  cursor:pointer;
  font-size:13px;
}

.btn:hover{
  background:#444;
}

.btn.on{
  background:#4a6ee0;
}

.btn.red{
  background:#8d2f2f;
}

.btn.green{
  background:#2c9a55;
}

.dot{
  width:26px;
  height:26px;
  border-radius:50%;
  border:2px solid transparent;
  background:#777;
  cursor:pointer;
}

.dot.on{
  border-color:white;
}

#colorPicker{
  width:34px;
  height:34px;
  border:none;
  background:none;
  cursor:pointer;
}

#status{
  color:#9be38b;
  font-size:12px;
}

#pageInfo{
  color:white;
  min-width:45px;
  text-align:center;
}

#wrap{
  flex:1;
  position:relative;
  background:white;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  touch-action:none;
}

#bg{
  z-index:1;
}

#cv{
  z-index:2;
}

</style>
</head>

<body>

<div id="app">

<div id="toolbar">

<div class="title">🖊 Pizarra Pro Ultra</div>

<div class="btn on" data-tool="draw">Lápiz</div>
<div class="btn" data-tool="erase">Goma</div>

<div class="dot" data-size="1"></div>
<div class="dot" data-size="2"></div>
<div class="dot on" data-size="3"></div>
<div class="dot" data-size="5"></div>
<div class="dot" data-size="8"></div>
<div class="dot" data-size="12"></div>

<input type="color" id="colorPicker" value="#111111">

<div class="btn" id="plainBtn">Lisa</div>
<div class="btn on" id="linesBtn">Rayada</div>
<div class="btn" id="musicBtn">Pentagrama</div>

<div class="btn" id="prevBtn">◀</div>

<div id="pageInfo">1/1</div>

<div class="btn" id="nextBtn">▶</div>

<div class="btn green" id="addBtn">+ Página</div>

<div class="btn green" id="saveBtn">💾</div>

<div class="btn green" id="pngBtn">PNG</div>

<div class="btn green" id="pdfBtn">PDF</div>

<div class="btn red" id="clearBtn">Borrar</div>

<div id="status">✓</div>

</div>

<div id="wrap">

<canvas id="bg"></canvas>
<canvas id="cv"></canvas>

</div>

</div>

<script>

const bg = document.getElementById("bg");
const cv = document.getElementById("cv");

const bx = bg.getContext("2d");
const cx = cv.getContext("2d");

const wrap = document.getElementById("wrap");

const statusEl = document.getElementById("status");
const pageInfo = document.getElementById("pageInfo");

let tool = "draw";
let size = 3;
let color = "#111111";

let backgroundMode = "lines";

let drawing = false;

let lastX = 0;
let lastY = 0;

let pages = [null];
let currentPage = 0;

let saveTimeout = null;

function resizeCanvas(){

  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  const temp = document.createElement("canvas");

  temp.width = cv.width;
  temp.height = cv.height;

  if(cv.width > 0){
    temp.getContext("2d").drawImage(cv,0,0);
  }

  bg.width = w;
  bg.height = h;

  cv.width = w;
  cv.height = h;

  drawBackground();

  if(temp.width > 0){
    cx.drawImage(temp,0,0);
  }

}

window.addEventListener("resize",resizeCanvas);

function drawBackground(){

  bx.fillStyle = "#ffffff";
  bx.fillRect(0,0,bg.width,bg.height);

  if(backgroundMode === "plain"){
    return;
  }

  if(backgroundMode === "lines"){

    bx.strokeStyle = "#d4d4d4";
    bx.lineWidth = 1;

    for(let y=40;y<bg.height;y+=40){

      bx.beginPath();
      bx.moveTo(0,y);
      bx.lineTo(bg.width,y);
      bx.stroke();

    }

    return;
  }

  if(backgroundMode === "music"){

    bx.strokeStyle = "#999";
    bx.lineWidth = 1;

    for(let block=60; block<bg.height; block+=140){

      for(let i=0;i<5;i++){

        const y = block + i*14;

        bx.beginPath();
        bx.moveTo(0,y);
        bx.lineTo(bg.width,y);
        bx.stroke();

      }

    }

  }

}

function savePage(){

  clearTimeout(saveTimeout);

  saveTimeout = setTimeout(()=>{

    try{

      pages[currentPage] = cv.toDataURL("image/webp",0.8);

      localStorage.setItem(
        "pizarra_ultra",
        JSON.stringify({
          pages,
          currentPage,
          backgroundMode
        })
      );

      statusEl.textContent = "✓";

    }catch(e){

      statusEl.textContent = "⚠";

    }

  },400);

}

function loadPage(index){

  cx.clearRect(0,0,cv.width,cv.height);

  if(pages[index]){

    const img = new Image();

    img.onload = ()=>{

      cx.drawImage(img,0,0);

    };

    img.src = pages[index];

  }

  pageInfo.textContent =
    (index+1)+"/"+pages.length;

}

function getPos(e){

  const rect = cv.getBoundingClientRect();

  return {
    x:e.clientX - rect.left,
    y:e.clientY - rect.top
  };

}

function startDraw(e){

  drawing = true;

  const pos = getPos(e);

  lastX = pos.x;
  lastY = pos.y;

}

function draw(e){

  if(!drawing) return;

  const pos = getPos(e);

  cx.lineCap = "round";
  cx.lineJoin = "round";

  if(tool === "erase"){

    cx.globalCompositeOperation =
      "destination-out";

    cx.lineWidth = size * 2;

  }else{

    cx.globalCompositeOperation =
      "source-over";

    cx.strokeStyle = color;

    cx.lineWidth = size;

  }

  cx.beginPath();

  cx.moveTo(lastX,lastY);

  cx.lineTo(pos.x,pos.y);

  cx.stroke();

  lastX = pos.x;
  lastY = pos.y;

}

function stopDraw(){

  if(drawing){

    drawing = false;

    savePage();

  }

}

cv.addEventListener("pointerdown",startDraw);

cv.addEventListener("pointermove",draw);

cv.addEventListener("pointerup",stopDraw);

cv.addEventListener("pointercancel",stopDraw);

document.querySelectorAll("[data-tool]")
.forEach(btn=>{

  btn.addEventListener("click",()=>{

    document.querySelectorAll("[data-tool]")
    .forEach(b=>b.classList.remove("on"));

    btn.classList.add("on");

    tool = btn.dataset.tool;

  });

});

document.querySelectorAll("[data-size]")
.forEach(dot=>{

  dot.addEventListener("click",()=>{

    document.querySelectorAll("[data-size]")
    .forEach(d=>d.classList.remove("on"));

    dot.classList.add("on");

    size = Number(dot.dataset.size);

  });

});

document.getElementById("colorPicker")
.addEventListener("input",(e)=>{

  color = e.target.value;

});

function activateBgButton(id){

  ["plainBtn","linesBtn","musicBtn"]
  .forEach(x=>{

    document.getElementById(x)
    .classList.remove("on");

  });

  document.getElementById(id)
  .classList.add("on");

}

document.getElementById("plainBtn")
.addEventListener("click",()=>{

  backgroundMode = "plain";

  activateBgButton("plainBtn");

  drawBackground();

});

document.getElementById("linesBtn")
.addEventListener("click",()=>{

  backgroundMode = "lines";

  activateBgButton("linesBtn");

  drawBackground();

});

document.getElementById("musicBtn")
.addEventListener("click",()=>{

  backgroundMode = "music";

  activateBgButton("musicBtn");

  drawBackground();

});

document.getElementById("clearBtn")
.addEventListener("click",()=>{

  cx.clearRect(0,0,cv.width,cv.height);

  pages[currentPage] = null;

  savePage();

});

document.getElementById("saveBtn")
.addEventListener("click",()=>{

  savePage();

  statusEl.textContent = "✓ Guardado";

});

document.getElementById("nextBtn")
.addEventListener("click",()=>{

  savePage();

  if(currentPage < pages.length-1){

    currentPage++;

  }else{

    pages.push(null);

    currentPage = pages.length - 1;

  }

  loadPage(currentPage);

});

document.getElementById("prevBtn")
.addEventListener("click",()=>{

  if(currentPage > 0){

    savePage();

    currentPage--;

    loadPage(currentPage);

  }

});

document.getElementById("addBtn")
.addEventListener("click",()=>{

  savePage();

  pages.push(null);

  currentPage = pages.length - 1;

  loadPage(currentPage);

});

document.getElementById("pngBtn")
.addEventListener("click",()=>{

  const exportCanvas =
    document.createElement("canvas");

  exportCanvas.width = cv.width;
  exportCanvas.height = cv.height;

  const ex =
    exportCanvas.getContext("2d");

  ex.drawImage(bg,0,0);

  ex.drawImage(cv,0,0);

  const link =
    document.createElement("a");

  link.download =
    "pizarra.png";

  link.href =
    exportCanvas.toDataURL("image/png");

  link.click();

});

document.getElementById("pdfBtn")
.addEventListener("click",()=>{

  const exportCanvas =
    document.createElement("canvas");

  exportCanvas.width = cv.width;
  exportCanvas.height = cv.height;

  const ex =
    exportCanvas.getContext("2d");

  ex.drawImage(bg,0,0);

  ex.drawImage(cv,0,0);

  const img =
    exportCanvas.toDataURL("image/jpeg",1);

  const { jsPDF } = window.jspdf;

  const pdf =
    new jsPDF("landscape");

  pdf.addImage(
    img,
    "JPEG",
    10,
    10,
    270,
    150
  );

  pdf.save("pizarra.pdf");

});

try{

  const data =
    JSON.parse(
      localStorage.getItem("pizarra_ultra")
    );

  if(data){

    pages = data.pages || [null];

    currentPage =
      data.currentPage || 0;

    backgroundMode =
      data.backgroundMode || "lines";

  }

}catch(e){}

resizeCanvas();

loadPage(currentPage);

if(backgroundMode === "plain"){
  activateBgButton("plainBtn");
}

if(backgroundMode === "lines"){
  activateBgButton("linesBtn");
}

if(backgroundMode === "music"){
  activateBgButton("musicBtn");
}

drawBackground();

</script>

</body>
</html>
```
