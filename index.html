```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizarra Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#1e1e1e;
  height:100vh;
  font-family:Arial,sans-serif;
}

#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

#toolbar{
  background:#232323;
  border-bottom:1px solid #444;
  padding:10px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  z-index:10;
}

.title{
  color:white;
  font-weight:bold;
  margin-right:10px;
}

.btn{
  background:#333;
  color:white;
  border:none;
  border-radius:8px;
  padding:8px 12px;
  cursor:pointer;
  transition:.2s;
  font-size:14px;
}

.btn:hover{
  background:#444;
}

.btn.on{
  background:#4a6ee0;
}

.btn.red{
  background:#8b2d2d;
}

.btn.green{
  background:#2d8f4e;
}

.dot{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#666;
  border:2px solid transparent;
  cursor:pointer;
}

.dot.on{
  border-color:white;
}

#colorPicker{
  width:35px;
  height:35px;
  border:none;
  background:none;
  cursor:pointer;
}

#status{
  color:#8bc34a;
  font-size:13px;
}

#pageInfo{
  color:white;
  min-width:40px;
  text-align:center;
}

#wrap{
  flex:1;
  position:relative;
  background:white;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  touch-action:none;
}

#bg{
  z-index:1;
}

#cv{
  z-index:2;
}

#ocrModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

#ocrBox{
  background:#232323;
  border:1px solid #555;
  border-radius:12px;
  width:100%;
  max-width:500px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

#ocrStatus{
  color:#8bc34a;
}

#ocrText{
  width:100%;
  min-height:200px;
  resize:vertical;
  background:#111;
  color:white;
  border:1px solid #444;
  border-radius:8px;
  padding:10px;
  outline:none;
}

</style>
</head>

<body>

<div id="app">

<div id="toolbar">

<div class="title">🖊 Pizarra Pro</div>

<div class="btn on" data-tool="draw">Lápiz</div>
<div class="btn" data-tool="erase">Goma</div>

<div class="dot" data-size="2"></div>
<div class="dot on" data-size="4"></div>
<div class="dot" data-size="8"></div>
<div class="dot" data-size="14"></div>

<input type="color" id="colorPicker" value="#111111">

<div class="btn" id="bgPlain">Lisa</div>
<div class="btn on" id="bgLines">Rayada</div>

<div class="btn" id="prevBtn">◀</div>

<div id="pageInfo">1/1</div>

<div class="btn" id="nextBtn">▶</div>

<div class="btn green" id="addPageBtn">+ Página</div>

<div class="btn green" id="saveBtn">💾 Guardar</div>

<div class="btn" id="ocrBtn">OCR</div>

<div class="btn red" id="clearBtn">Borrar</div>

<div id="status">✓</div>

</div>

<div id="wrap">
  <canvas id="bg"></canvas>
  <canvas id="cv"></canvas>
</div>

</div>

<div id="ocrModal">

<div id="ocrBox">

<div id="ocrStatus">OCR listo</div>

<textarea id="ocrText"></textarea>

<div style="display:flex;gap:10px;flex-wrap:wrap">

<button class="btn green" id="copyBtn">Copiar</button>

<button class="btn green" id="downloadBtn">Descargar TXT</button>

<button class="btn red" id="closeOcrBtn">Cerrar</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

const bg = document.getElementById("bg");
const cv = document.getElementById("cv");

const bx = bg.getContext("2d");
const cx = cv.getContext("2d");

const wrap = document.getElementById("wrap");

const statusEl = document.getElementById("status");
const pageInfo = document.getElementById("pageInfo");

let tool = "draw";
let size = 4;
let color = "#111111";
let backgroundMode = "lines";

let drawing = false;

let lastX = 0;
let lastY = 0;

let pages = [null];
let currentPage = 0;

function resizeCanvas(){

  const w = wrap.clientWidth;
  const h = wrap.clientHeight;

  const temp = document.createElement("canvas");

  temp.width = cv.width;
  temp.height = cv.height;

  if(cv.width > 0){
    temp.getContext("2d").drawImage(cv,0,0);
  }

  bg.width = w;
  bg.height = h;

  cv.width = w;
  cv.height = h;

  drawBackground();

  if(temp.width > 0){
    cx.drawImage(temp,0,0);
  }

}

window.addEventListener("resize",resizeCanvas);

function drawBackground(){

  bx.fillStyle = "#ffffff";
  bx.fillRect(0,0,bg.width,bg.height);

  if(backgroundMode === "plain") return;

  bx.strokeStyle = "#d0d0d0";
  bx.lineWidth = 1;

  for(let y=40;y<bg.height;y+=40){

    bx.beginPath();
    bx.moveTo(0,y);
    bx.lineTo(bg.width,y);
    bx.stroke();

  }

}

function savePage(){

  pages[currentPage] = cv.toDataURL();

  localStorage.setItem("pizarra_pro",JSON.stringify({
    pages,
    currentPage,
    backgroundMode
  }));

  statusEl.textContent = "✓ Guardado";

  setTimeout(()=>{
    statusEl.textContent = "✓";
  },1500);

}

function loadPage(index){

  cx.clearRect(0,0,cv.width,cv.height);

  if(pages[index]){

    const img = new Image();

    img.onload = ()=>{
      cx.drawImage(img,0,0);
    };

    img.src = pages[index];

  }

  pageInfo.textContent =
    (index+1)+"/"+pages.length;

}

function getPos(e){

  const rect = cv.getBoundingClientRect();

  return {
    x:e.clientX - rect.left,
    y:e.clientY - rect.top
  };

}

function startDraw(e){

  drawing = true;

  const pos = getPos(e);

  lastX = pos.x;
  lastY = pos.y;

}

function draw(e){

  if(!drawing) return;

  const pos = getPos(e);

  cx.lineCap = "round";
  cx.lineJoin = "round";

  if(tool === "erase"){

    cx.globalCompositeOperation = "destination-out";
    cx.lineWidth = size * 2;

  }else{

    cx.globalCompositeOperation = "source-over";
    cx.strokeStyle = color;
    cx.lineWidth = size;

  }

  cx.beginPath();

  cx.moveTo(lastX,lastY);
  cx.lineTo(pos.x,pos.y);

  cx.stroke();

  lastX = pos.x;
  lastY = pos.y;

}

function stopDraw(){

  if(drawing){

    drawing = false;

    savePage();

  }

}

cv.addEventListener("pointerdown",startDraw);

cv.addEventListener("pointermove",draw);

cv.addEventListener("pointerup",stopDraw);

cv.addEventListener("pointercancel",stopDraw);

document.querySelectorAll("[data-tool]")
.forEach(btn=>{

  btn.addEventListener("click",()=>{

    document.querySelectorAll("[data-tool]")
    .forEach(b=>b.classList.remove("on"));

    btn.classList.add("on");

    tool = btn.dataset.tool;

  });

});

document.querySelectorAll("[data-size]")
.forEach(dot=>{

  dot.addEventListener("click",()=>{

    document.querySelectorAll("[data-size]")
    .forEach(d=>d.classList.remove("on"));

    dot.classList.add("on");

    size = Number(dot.dataset.size);

  });

});

document.getElementById("colorPicker")
.addEventListener("input",(e)=>{

  color = e.target.value;

});

document.getElementById("saveBtn")
.addEventListener("click",savePage);

document.getElementById("clearBtn")
.addEventListener("click",()=>{

  cx.clearRect(0,0,cv.width,cv.height);

  pages[currentPage] = null;

  savePage();

});

document.getElementById("nextBtn")
.addEventListener("click",()=>{

  savePage();

  if(currentPage < pages.length-1){

    currentPage++;

  }else{

    pages.push(null);

    currentPage = pages.length - 1;

  }

  loadPage(currentPage);

});

document.getElementById("prevBtn")
.addEventListener("click",()=>{

  if(currentPage > 0){

    savePage();

    currentPage--;

    loadPage(currentPage);

  }

});

document.getElementById("addPageBtn")
.addEventListener("click",()=>{

  savePage();

  pages.push(null);

  currentPage = pages.length - 1;

  loadPage(currentPage);

});

document.getElementById("bgPlain")
.addEventListener("click",()=>{

  backgroundMode = "plain";

  document.getElementById("bgPlain")
  .classList.add("on");

  document.getElementById("bgLines")
  .classList.remove("on");

  drawBackground();

  savePage();

});

document.getElementById("bgLines")
.addEventListener("click",()=>{

  backgroundMode = "lines";

  document.getElementById("bgLines")
  .classList.add("on");

  document.getElementById("bgPlain")
  .classList.remove("on");

  drawBackground();

  savePage();

});

const ocrModal = document.getElementById("ocrModal");
const ocrStatus = document.getElementById("ocrStatus");
const ocrText = document.getElementById("ocrText");

document.getElementById("ocrBtn")
.addEventListener("click",async()=>{

  ocrModal.style.display = "flex";

  ocrStatus.textContent = "Procesando OCR...";

  try{

    const temp = document.createElement("canvas");

    temp.width = cv.width;
    temp.height = cv.height;

    const tctx = temp.getContext("2d");

    tctx.fillStyle = "white";
    tctx.fillRect(0,0,temp.width,temp.height);

    tctx.drawImage(cv,0,0);

    const worker = await Tesseract.createWorker("spa");

    const result =
      await worker.recognize(temp);

    ocrText.value = result.data.text;

    ocrStatus.textContent = "✓ OCR completo";

    await worker.terminate();

  }catch(err){

    ocrStatus.textContent =
      "Error OCR";

  }

});

document.getElementById("copyBtn")
.addEventListener("click",()=>{

  navigator.clipboard.writeText(
    ocrText.value
  );

  ocrStatus.textContent =
    "✓ Copiado";

});

document.getElementById("downloadBtn")
.addEventListener("click",()=>{

  const a =
    document.createElement("a");

  a.href = URL.createObjectURL(
    new Blob([ocrText.value],{
      type:"text/plain"
    })
  );

  a.download = "texto.txt";

  a.click();

});

document.getElementById("closeOcrBtn")
.addEventListener("click",()=>{

  ocrModal.style.display = "none";

});

try{

  const data =
    JSON.parse(
      localStorage.getItem("pizarra_pro")
    );

  if(data){

    pages = data.pages || [null];

    currentPage =
      data.currentPage || 0;

    backgroundMode =
      data.backgroundMode || "lines";

  }

}catch(e){}

if(backgroundMode === "plain"){

  document.getElementById("bgPlain")
  .classList.add("on");

  document.getElementById("bgLines")
  .classList.remove("on");

}

resizeCanvas();

loadPage(currentPage);

</script>

</body>
</html>
```
