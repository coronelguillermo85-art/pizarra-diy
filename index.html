<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pizarra DIY</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #app { display: flex; flex-direction: column; height: 100vh; width: 100%; background: #1a1a2e; }
    #toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: #16213e; border-bottom: 0.5px solid #0f3460;
      flex-shrink: 0; gap: 8px; user-select: none; touch-action: none; flex-wrap: wrap;
    }
    #toolbar-title { color: #e0e0ff; font-size: 14px; font-weight: 500; font-family: sans-serif; letter-spacing: 1px; }
    .tb-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tb-btn {
      background: #0f3460; color: #e0e0ff; border: 0.5px solid #533483;
      border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: sans-serif; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; min-height: 36px;
    }
    .tb-btn:active { background: #533483; }
    .tb-btn.active { background: #533483; border-color: #a78bfa; }
    .tb-btn.danger { background: #3d0c0c; border-color: #e74c3c; color: #ffaaaa; }
    .tb-btn.danger:active { background: #6b1414; }
    .tb-btn.ocr-btn { background: #0d3d2e; border-color: #1abc9c; color: #aafce8; }
    .tb-btn.ocr-btn:active { background: #1a5c44; }
    .tb-btn.page-btn { background: #1a1a3e; border-color: #a78bfa; color: #e0e0ff; font-size: 15px; padding: 8px 10px; }
    .tb-btn.page-btn:active { background: #533483; }
    #pageIndicator { color: #a78bfa; font-size: 13px; font-family: sans-serif; font-weight: 600; min-width: 48px; text-align: center; }
    #saveStatus { color: #a78bfa; font-size: 11px; font-family: sans-serif; min-width: 60px; text-align: right; }
    .sep { width: 0.5px; height: 24px; background: #0f3460; }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #bgLayer { position: absolute; inset: 0; pointer-events: none; }
    #drawCanvas { position: absolute; inset: 0; touch-action: none; cursor: crosshair; }
    .size-dot {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; background: #0f3460;
      border: 0.5px solid #533483; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .size-dot.active { border-color: #a78bfa; background: #533483; }
    .dot-inner { background: #e0e0ff; border-radius: 50%; pointer-events: none; }
    #colorPicker {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid #533483;
      padding: 0; cursor: pointer; background: none; -webkit-tap-highlight-color: transparent;
    }
    #ocrModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 100; align-items: center; justify-content: center; padding: 16px;
    }
    #ocrModal.open { display: flex; }
    #ocrBox {
      background: #16213e; border: 0.5px solid #533483; border-radius: 12px;
      padding: 20px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px;
    }
    #ocrBox h2 { color: #e0e0ff; font-size: 15px; font-family: sans-serif; font-weight: 500; }
    #ocrStatus { color: #aafce8; font-size: 13px; font-family: sans-serif; min-height: 18px; }
    #ocrText {
      background: #0f1923; color: #e0e0ff; border: 0.5px solid #533483;
      border-radius: 8px; padding: 12px; font-size: 14px; font-family: sans-serif;
      min-height: 120px; resize: vertical; width: 100%; outline: none;
    }
    .ocr-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    #pageFlash {
      position: absolute; inset: 0; background: white; opacity: 0;
      pointer-events: none; transition: opacity 0.15s;
    }
    #pageFlash.flash { opacity: 0.4; }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="tb-row">
      <span id="toolbar-title">✎ PIZARRA</span>
      <span id="saveStatus">✓ guardado</span>
    </div>
    <div class="tb-row">
      <div class="size-dot active" data-size="3"><div class="dot-inner" style="width:5px;height:5px"></div></div>
      <div class="size-dot" data-size="7"><div class="dot-inner" style="width:9px;height:9px"></div></div>
      <div class="size-dot" data-size="14"><div class="dot-inner" style="width:15px;height:15px"></div></div>
      <input type="color" id="colorPicker" value="#2c2c2a">
      <div class="sep"></div>
      <div class="tb-btn active" data-mode="linea">Línea</div>
      <div class="tb-btn" data-mode="goma">Goma</div>
      <div class="sep"></div>
      <div class="tb-btn" data-bg="lisa">Lisa</div>
      <div class="tb-btn active" data-bg="rayada">Rayada</div>
      <div class="tb-btn" data-bg="penta">♪</div>
      <div class="sep"></div>
      <div class="tb-btn page-btn" id="prevBtn">▲</div>
      <span id="pageIndicator">1 / 1</span>
      <div class="tb-btn page-btn" id="nextBtn">▼</div>
      <div class="tb-btn ocr-btn" id="addPageBtn">+ Pág</div>
      <div class="sep"></div>
      <div class="tb-btn ocr-btn" id="ocrBtn">OCR</div>
      <div class="tb-btn danger" id="clearBtn">Borrar</div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="bgLayer"></canvas>
    <canvas id="drawCanvas"></canvas>
    <div id="pageFlash"></div>
  </div>
</div>

<div id="ocrModal">
  <div id="ocrBox">
    <h2>Texto reconocido</h2>
    <div id="ocrStatus">Procesando...</div>
    <textarea id="ocrText" placeholder="El texto aparece acá..."></textarea>
    <div class="ocr-actions">
      <div class="tb-btn ocr-btn" id="copyBtn">Copiar</div>
      <div class="tb-btn ocr-btn" id="downloadBtn">Descargar .txt</div>
      <div class="tb-btn danger" id="closeOcrBtn">Cerrar</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const bgCanvas = document.getElementById('bgLayer');
const bgCtx = bgCanvas.getContext('2d');
const dc = document.getElementById('drawCanvas');
const ctx = dc.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const pageIndicator = document.getElementById('pageIndicator');
const pageFlash = document.getElementById('pageFlash');
const saveStatus = document.getElementById('saveStatus');

const STORAGE_KEY = 'pizarra_diy_v1';

let isDrawing = false;
let activePointerId = null; // ID del puntero que está dibujando
let lastX = 0, lastY = 0;
let currentBg = 'rayada';
let currentMode = 'linea';
let currentSize = 3;
let currentColor = '#2c2c2a';
let pages = [null];
let currentPage = 0;
let saveTimer = null;

// --- Persistencia ---
function saveToStorage() {
  saveStatus.textContent = '...';
  savePage();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ pages, currentPage, currentBg }));
    saveStatus.textContent = '✓ guardado';
  } catch(e) {
    saveStatus.textContent = '⚠ sin espacio';
  }
}

function scheduleSave() {
  saveStatus.textContent = '...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToStorage, 1500);
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    pages = data.pages || [null];
    currentPage = data.currentPage || 0;
    currentBg = data.currentBg || 'rayada';
    document.querySelectorAll('[data-bg]').forEach(b => {
      b.classList.toggle('active', b.dataset.bg === currentBg);
    });
    return true;
  } catch(e) { return false; }
}

// --- Canvas ---
function resizeCanvases() {
  if (wrap.clientWidth === 0 || wrap.clientHeight === 0) return;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const tmp = document.createElement('canvas');
  tmp.width = dc.width; tmp.height = dc.height;
  if (dc.width > 0 && dc.height > 0) tmp.getContext('2d').drawImage(dc, 0, 0);
  dc.width = w; dc.height = h;
  bgCanvas.width = w; bgCanvas.height = h;
  ctx.drawImage(tmp, 0, 0);
  drawBg();
}

function drawBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);
  bgCtx.fillStyle = '#ecf0f1';
  bgCtx.fillRect(0, 0, w, h);
  if (currentBg === 'lisa') return;
  if (currentBg === 'rayada') {
    bgCtx.strokeStyle = '#bdc3c7'; bgCtx.lineWidth = 1;
    for (let y = 40; y < h; y += 40) {
      bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(w, y); bgCtx.stroke();
    }
    return;
  }
  if (currentBg === 'penta') {
    bgCtx.strokeStyle = '#95a5a6'; bgCtx.lineWidth = 1;
    for (let base = 60; base < h; base += 160) {
      for (let i = 0; i < 5; i++) {
        const y = base + i * 12;
        bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(w, y); bgCtx.stroke();
      }
    }
  }
}

function savePage() { pages[currentPage] = dc.toDataURL(); }

function loadPage(index) {
  ctx.clearRect(0, 0, dc.width, dc.height);
  const data = pages[index];
  if (data) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = data;
  }
  updateIndicator();
}

function updateIndicator() {
  pageIndicator.textContent = (currentPage + 1) + ' / ' + pages.length;
}

function flashTransition() {
  pageFlash.classList.add('flash');
  setTimeout(() => pageFlash.classList.remove('flash'), 150);
}

function goToPage(index) {
  savePage(); flashTransition();
  currentPage = index;
  setTimeout(() => loadPage(currentPage), 80);
  scheduleSave();
}

document.getElementById('prevBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (currentPage > 0) goToPage(currentPage - 1);
});
document.getElementById('nextBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (currentPage < pages.length - 1) goToPage(currentPage + 1);
});
document.getElementById('addPageBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  savePage(); pages.push(null); flashTransition();
  currentPage = pages.length - 1;
  setTimeout(() => { ctx.clearRect(0, 0, dc.width, dc.height); updateIndicator(); }, 80);
  scheduleSave();
});

// --- PALM REJECTION ---
// Solo acepta el primer puntero que toca el canvas.
// Si ya hay un trazo activo, ignora cualquier otro dedo/palma.
function isValidPointer(e) {
  // Si hay un trazo activo, solo acepta el mismo pointer ID
  if (isDrawing) return e.pointerId === activePointerId;
  // Si no hay trazo activo, acepta el primer toque
  return true;
}

function getPos(e) {
  const r = dc.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

function getPosFromTouch(t) {
  const r = dc.getBoundingClientRect();
  return [t.clientX - r.left, t.clientY - r.top];
}

function drawDot(x, y) {
  ctx.save();
  ctx.beginPath();
  if (currentMode === 'goma') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.arc(x, y, currentSize * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,1)'; ctx.fill();
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.arc(x, y, currentSize / 2, 0, Math.PI * 2);
    ctx.fillStyle = currentColor; ctx.fill();
  }
  ctx.restore();
}

function drawLine(x1, y1, x2, y2, pressure) {
  ctx.save();
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  if (currentMode === 'goma') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = currentSize * 3;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = (pressure && pressure > 0) ? Math.max(1, pressure * currentSize * 2) : currentSize;
  }
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.restore();
}

function startDraw(e) {
  e.preventDefault();
  if (isDrawing) return;
  isDrawing = true;
  activePointerId = e.pointerId;
  try { dc.setPointerCapture(e.pointerId); } catch(_) {}
  [lastX, lastY] = getPos(e);
  drawDot(lastX, lastY);
}

function doDraw(e) {
  if (!isDrawing && e.buttons > 0) { startDraw(e); return; }
  if (!isDrawing || e.pointerId !== activePointerId) return;
  e.preventDefault();
  const [cx, cy] = getPos(e);
  drawLine(lastX, lastY, cx, cy, e.pressure);
  lastX = cx; lastY = cy;
}

function endDraw(e) {
  if (e && e.pointerId !== activePointerId) return;
  if (!isDrawing) return;
  isDrawing = false;
  activePointerId = null;
  scheduleSave();
}

// Touch events en paralelo — más sensibles en algunos Android
function onTouchStart(e) {
  e.preventDefault();
  if (isDrawing) return;
  // solo primer toque
  const t = e.changedTouches[0];
  isDrawing = true;
  activePointerId = -1; // touch mode
  [lastX, lastY] = getPosFromTouch(t);
  drawDot(lastX, lastY);
}

function onTouchMove(e) {
  e.preventDefault();
  if (!isDrawing || activePointerId !== -1) return;
  const t = e.changedTouches[0];
  const [cx, cy] = getPosFromTouch(t);
  drawLine(lastX, lastY, cx, cy, 0);
  lastX = cx; lastY = cy;
}

function onTouchEnd(e) {
  e.preventDefault();
  if (activePointerId !== -1) return;
  isDrawing = false;
  activePointerId = null;
  scheduleSave();
}

dc.addEventListener('pointerdown', startDraw, { passive: false });
dc.addEventListener('pointermove', doDraw, { passive: false });
dc.addEventListener('pointerenter', e => { if (e.buttons > 0 && !isDrawing) startDraw(e); }, { passive: false });
dc.addEventListener('pointerup', endDraw);
dc.addEventListener('pointercancel', endDraw);
dc.addEventListener('touchstart', onTouchStart, { passive: false });
dc.addEventListener('touchmove', onTouchMove, { passive: false });
dc.addEventListener('touchend', onTouchEnd, { passive: false });
dc.addEventListener('touchcancel', onTouchEnd, { passive: false });

document.getElementById('clearBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  ctx.clearRect(0, 0, dc.width, dc.height);
  pages[currentPage] = null;
  scheduleSave();
});

document.querySelectorAll('[data-bg]').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    currentBg = btn.dataset.bg;
    document.querySelectorAll('[data-bg]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawBg(); scheduleSave();
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    currentMode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.querySelectorAll('[data-size]').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation();
    currentSize = parseInt(btn.dataset.size);
    document.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('colorPicker').addEventListener('input', e => {
  currentColor = e.target.value;
});

// --- OCR ---
const ocrModal = document.getElementById('ocrModal');
const ocrStatus = document.getElementById('ocrStatus');
const ocrText = document.getElementById('ocrText');

document.getElementById('ocrBtn').addEventListener('pointerdown', async e => {
  e.stopPropagation();
  ocrModal.classList.add('open');
  ocrText.value = '';
  ocrStatus.textContent = 'Preparando imagen...';
  const merged = document.createElement('canvas');
  merged.width = dc.width; merged.height = dc.height;
  const mCtx = merged.getContext('2d');
  mCtx.fillStyle = '#ffffff';
  mCtx.fillRect(0, 0, merged.width, merged.height);
  mCtx.drawImage(dc, 0, 0);
  try {
    ocrStatus.textContent = 'Cargando motor OCR...';
    const worker = await Tesseract.createWorker('spa', 1, {
      logger: m => {
        if (m.status === 'recognizing text')
          ocrStatus.textContent = 'Reconociendo... ' + Math.round(m.progress * 100) + '%';
      }
    });
    const { data: { text } } = await worker.recognize(merged);
    await worker.terminate();
    ocrText.value = text.trim() || '(No se reconoció texto)';
    ocrStatus.textContent = 'Listo ✓';
  } catch (err) {
    ocrStatus.textContent = 'Error: ' + err.message;
  }
});

document.getElementById('copyBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  navigator.clipboard.writeText(ocrText.value).then(() => { ocrStatus.textContent = '¡Copiado!'; });
});

document.getElementById('downloadBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  const blob = new Blob([ocrText.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pizarra_texto.txt';
  a.click();
});

document.getElementById('closeOcrBtn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  ocrModal.classList.remove('open');
});

// --- Init ---
window.addEventListener('resize', resizeCanvases);
resizeCanvases();
const loaded = loadFromStorage();
drawBg();
if (loaded) loadPage(currentPage);
else updateIndicator();
</script>
</body>
</html>
