<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pizarra DIY - Lápiz perfecto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
    #app { display: flex; flex-direction: column; height: 100vh; width: 100%; }
    #toolbar {
      background: #16213e; padding: 8px 10px;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      user-select: none; flex-shrink: 0;
    }
    .btn {
      background: #0f3460; color: #e0e0ff; border: 1px solid #533483;
      border-radius: 6px; padding: 7px 12px; font-size: 13px; font-family: sans-serif;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; user-select: none;
    }
    .btn.on  { background: #533483; border-color: #a78bfa; }
    .btn.red { background: #3d0c0c; border-color: #e74c3c; color: #ffaaaa; }
    .btn.grn { background: #0d3d2e; border-color: #1abc9c; color: #aafce8; }
    .dot {
      width: 26px; height: 26px; border-radius: 50%;
      background: #0f3460; border: 1px solid #533483;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .dot.on { background: #533483; border-color: #a78bfa; }
    .di { background: #e0e0ff; border-radius: 50%; pointer-events: none; }
    #cp {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid #533483; padding: 0; cursor: pointer;
    }
    #pi { color: #a78bfa; font-size: 13px; font-family: sans-serif; font-weight: 600; min-width: 40px; text-align: center; }
    #ss { color: #a78bfa; font-size: 11px; font-family: sans-serif; }
    #wrap { flex: 1; position: relative; background: #ecf0f1; overflow: hidden; touch-action: none; }
    canvas { position: absolute; top: 0; left: 0; }
    #bg { pointer-events: none; }
    #cv { touch-action: none; }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span style="color:#e0e0ff;font-size:13px;font-family:sans-serif;font-weight:500">✎ PIZARRA</span>
    <span id="ss">✓</span>
    <div class="dot on" data-sz="3"><div class="di" style="width:4px;height:4px"></div></div>
    <div class="dot"    data-sz="7"><div class="di" style="width:8px;height:8px"></div></div>
    <div class="dot"    data-sz="14"><div class="di" style="width:13px;height:13px"></div></div>
    <input type="color" id="cp" value="#1a1a2e">
    <div class="btn on"  data-md="draw">Lápiz</div>
    <div class="btn"     data-md="erase">Goma</div>
    <div class="btn"     data-bg="lisa">Lisa</div>
    <div class="btn on"  data-bg="ray">Rayada</div>
    <div class="btn"     data-bg="penta">♪</div>
    <div class="btn"     id="pb">◀</div>
    <span id="pi">1/1</span>
    <div class="btn"     id="nb">▶</div>
    <div class="btn grn" id="ap">+Pág</div>
    <div class="btn grn" id="ob">OCR</div>
    <div class="btn red" id="cb">Borrar</div>
  </div>
  <div id="wrap">
    <canvas id="bg"></canvas>
    <canvas id="cv"></canvas>
  </div>
</div>

<!-- OCR modal -->
<div id="om" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:99;align-items:center;justify-content:center;padding:16px">
  <div style="background:#16213e;border:1px solid #533483;border-radius:10px;padding:16px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px">
    <div id="os" style="color:#aafce8;font-size:13px;font-family:sans-serif"></div>
    <textarea id="ot" style="background:#0f1923;color:#e0e0ff;border:1px solid #533483;border-radius:6px;padding:10px;font-size:13px;font-family:sans-serif;min-height:100px;width:100%;outline:none;resize:vertical"></textarea>
    <div style="display:flex;gap:8px">
      <div class="btn grn" id="cpy">Copiar</div>
      <div class="btn grn" id="dl">Bajar .txt</div>
      <div class="btn red" id="cl">Cerrar</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// elementos
const bgc = document.getElementById('bg');
const bx  = bgc.getContext('2d');
const cv  = document.getElementById('cv');
const cx  = cv.getContext('2d');
const wr  = document.getElementById('wrap');
const pi  = document.getElementById('pi');
const ss  = document.getElementById('ss');

// estado
let bg   = 'ray';
let md   = 'draw';
let sz   = 3;
let col  = '#1a1a2e';
let pages = [null];
let pg   = 0;
let svT  = null;
let necesitaGuardar = false;  // ← NUEVO: guardado diferido sin bloquear

// dibujo
let on = false;
let aid = null;
let lx = 0, ly = 0;
let ultimoMovimiento = 0;  // ← NUEVO: para throttle suave

// resize
function resize() {
  const w = wr.clientWidth, h = wr.clientHeight;
  if (!w || !h) return;
  const t = document.createElement('canvas');
  t.width = cv.width; t.height = cv.height;
  if (cv.width && cv.height) t.getContext('2d').drawImage(cv, 0, 0);
  cv.width  = bgc.width  = w;
  cv.height = bgc.height = h;
  if (t.width && t.height) cx.drawImage(t, 0, 0);
  drawBg();
}
window.addEventListener('resize', resize);
setTimeout(resize, 100);

// fondo
function drawBg() {
  const w = bgc.width, h = bgc.height;
  bx.fillStyle = '#ecf0f1';
  bx.fillRect(0, 0, w, h);
  if (bg === 'lisa') return;
  if (bg === 'ray') {
    bx.strokeStyle = '#bdc3c7'; bx.lineWidth = 1;
    for (let y = 40; y < h; y += 40) { bx.beginPath(); bx.moveTo(0,y); bx.lineTo(w,y); bx.stroke(); }
    return;
  }
  bx.strokeStyle = '#95a5a6'; bx.lineWidth = 1;
  for (let b = 60; b < h; b += 160)
    for (let i = 0; i < 5; i++) { bx.beginPath(); bx.moveTo(0, b+i*12); bx.lineTo(w, b+i*12); bx.stroke(); }
}

// páginas - GUARDADO SILENCIOSO QUE NO BLOQUEA
function save() { 
  pages[pg] = cv.toDataURL(); 
}

function persistirSilencioso() {
  // Solo marca que hay que guardar, no ejecuta inmediatamente
  necesitaGuardar = true;
  ss.textContent = '...';
  
  clearTimeout(svT);
  svT = setTimeout(() => {
    if (necesitaGuardar) {
      save();
      try { 
        localStorage.setItem('piz_v4', JSON.stringify({pages, pg, bg})); 
        ss.textContent = '✓';
        necesitaGuardar = false;
      } catch(e) { 
        ss.textContent = '⚠'; 
      }
    }
  }, 1500);  // ← más lento para no interferir
}

function guardadoInmediato() {
  save();
  try { 
    localStorage.setItem('piz_v4', JSON.stringify({pages, pg, bg})); 
    ss.textContent = '✓';
  } catch(e) { 
    ss.textContent = '⚠'; 
  }
  necesitaGuardar = false;
  clearTimeout(svT);
}

function load(i)  {
  cx.clearRect(0, 0, cv.width, cv.height);
  if (pages[i]) { const im = new Image(); im.onload = () => cx.drawImage(im, 0, 0); im.src = pages[i]; }
  pi.textContent = (i+1) + '/' + pages.length;
}

document.getElementById('pb').addEventListener('pointerdown', e => {
  e.stopPropagation(); 
  if (pg > 0) { 
    save(); 
    pg--; 
    load(pg); 
    guardadoInmediato();
  }
});
document.getElementById('nb').addEventListener('pointerdown', e => {
  e.stopPropagation(); 
  save();
  if (pg < pages.length - 1) { 
    pg++; 
  } else { 
    pages.push(null); 
    pg = pages.length - 1; 
  }
  load(pg); 
  guardadoInmediato();
});
document.getElementById('ap').addEventListener('pointerdown', e => {
  e.stopPropagation(); 
  save(); 
  pages.push(null); 
  pg = pages.length - 1; 
  load(pg); 
  guardadoInmediato();
});

// ========== DIBUJO CORREGIDO - SIN INTERFERENCIA DEL GUARDADO ==========
function xy(e) {
  const r = cv.getBoundingClientRect();
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return [clientX - r.left, clientY - r.top];
}

function iniciarTrazo(x, y) {
  on = true;
  lx = x; ly = y;
  cx.save();
  cx.beginPath();
  cx.globalCompositeOperation = md === 'erase' ? 'destination-out' : 'source-over';
  
  if (md === 'erase') {
    cx.arc(x, y, sz * 1.5, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(0,0,0,1)';
    cx.fill();
  } else {
    cx.arc(x, y, sz * 0.4, 0, Math.PI * 2);
    cx.fillStyle = col;
    cx.fill();
  }
  cx.restore();
}

function dibujarTrazo(x, y, pressure = 0.5) {
  if (!on) return;
  
  cx.save();
  cx.lineJoin = 'round';
  cx.lineCap = 'round';
  cx.globalCompositeOperation = md === 'erase' ? 'destination-out' : 'source-over';
  
  let lineWidth;
  if (md === 'erase') {
    lineWidth = sz * 2.5;
    cx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    // Presión: entre 0.4x y 2.2x el tamaño base
    let pressureFactor = Math.min(2.2, Math.max(0.4, pressure * 1.8));
    if (pressure === 0.5 && e.pressure === undefined) pressureFactor = 1.0;
    lineWidth = sz * pressureFactor;
    cx.strokeStyle = col;
  }
  
  cx.lineWidth = lineWidth;
  cx.beginPath();
  cx.moveTo(lx, ly);
  cx.lineTo(x, y);
  cx.stroke();
  cx.restore();
  
  lx = x;
  ly = y;
}

function finalizarTrazo() {
  if (on) {
    on = false;
    aid = null;
    persistirSilencioso();  // ← guardado diferido, NO bloquea
  }
}

// POINTER EVENTS (para lápiz con presión)
cv.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (on) return;
  aid = e.pointerId;
  try { cv.setPointerCapture(e.pointerId); } catch(_) {}
  const [x, y] = xy(e);
  iniciarTrazo(x, y);
}, { passive: false });

cv.addEventListener('pointermove', (e) => {
  e.preventDefault();
  
  // Si el lápiz está presionando pero no iniciamos (caso borde)
  if (!on && e.buttons === 1) {
    aid = e.pointerId;
    const [x, y] = xy(e);
    iniciarTrazo(x, y);
    return;
  }
  
  if (!on || e.pointerId !== aid) return;
  
  const [x, y] = xy(e);
  let pressure = e.pressure;
  // Si el dispositivo no da presión, usar 0.7 por defecto
  if (!pressure || pressure === 0) pressure = 0.7;
  dibujarTrazo(x, y, pressure);
}, { passive: false });

cv.addEventListener('pointerup', (e) => {
  if (e.pointerId === aid || aid === null) finalizarTrazo();
});
cv.addEventListener('pointercancel', (e) => {
  if (e.pointerId === aid || aid === null) finalizarTrazo();
});

// TOUCH EVENTS (respaldo para dedo)
cv.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (on) return;
  aid = 'touch';
  const [x, y] = xy(e);
  iniciarTrazo(x, y);
}, { passive: false });

cv.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!on || aid !== 'touch') return;
  const [x, y] = xy(e);
  dibujarTrazo(x, y, 0.6);
}, { passive: false });

cv.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (aid === 'touch') finalizarTrazo();
});
cv.addEventListener('touchcancel', (e) => {
  e.preventDefault();
  if (aid === 'touch') finalizarTrazo();
});

// controles
document.querySelectorAll('[data-sz]').forEach(b => b.addEventListener('pointerdown', e => {
  e.stopPropagation(); sz = +b.dataset.sz;
  document.querySelectorAll('[data-sz]').forEach(x => x.classList.remove('on')); b.classList.add('on');
}));
document.querySelectorAll('[data-md]').forEach(b => b.addEventListener('pointerdown', e => {
  e.stopPropagation(); md = b.dataset.md;
  document.querySelectorAll('[data-md]').forEach(x => x.classList.remove('on')); b.classList.add('on');
}));
document.querySelectorAll('[data-bg]').forEach(b => b.addEventListener('pointerdown', e => {
  e.stopPropagation(); bg = b.dataset.bg;
  document.querySelectorAll('[data-bg]').forEach(x => x.classList.remove('on')); b.classList.add('on');
  drawBg(); guardadoInmediato();
}));
document.getElementById('cp').addEventListener('input', e => col = e.target.value);
document.getElementById('cb').addEventListener('pointerdown', e => {
  e.stopPropagation(); cx.clearRect(0,0,cv.width,cv.height); pages[pg]=null; guardadoInmediato();
});

// OCR
const om = document.getElementById('om');
const os = document.getElementById('os');
const ot = document.getElementById('ot');
document.getElementById('ob').addEventListener('pointerdown', async e => {
  e.stopPropagation(); om.style.display = 'flex'; ot.value = ''; os.textContent = 'Preparando...';
  const m = document.createElement('canvas'); m.width = cv.width; m.height = cv.height;
  const mx = m.getContext('2d'); mx.fillStyle = '#fff'; mx.fillRect(0,0,m.width,m.height); mx.drawImage(cv,0,0);
  try {
    os.textContent = 'Cargando OCR...';
    const w = await Tesseract.createWorker('spa', 1, { logger: x => { if (x.status==='recognizing text') os.textContent='Reconociendo '+Math.round(x.progress*100)+'%'; }});
    const { data:{text} } = await w.recognize(m); await w.terminate();
    ot.value = text.trim() || '(sin texto)'; os.textContent = 'Listo ✓';
  } catch(err) { os.textContent = 'Error: '+err.message; }
});
document.getElementById('cpy').addEventListener('pointerdown', e => { e.stopPropagation(); navigator.clipboard.writeText(ot.value).then(()=>os.textContent='¡Copiado!'); });
document.getElementById('dl').addEventListener('pointerdown', e => {
  e.stopPropagation(); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([ot.value],{type:'text/plain'})); a.download='texto.txt'; a.click();
});
document.getElementById('cl').addEventListener('pointerdown', e => { e.stopPropagation(); om.style.display='none'; });

// init
resize();
try {
  const d = JSON.parse(localStorage.getItem('piz_v4'));
  if (d) { pages=d.pages||[null]; pg=d.pg||0; bg=d.bg||'ray';
    document.querySelectorAll('[data-bg]').forEach(b=>b.classList.toggle('on', b.dataset.bg===bg)); }
} catch(_) {}
drawBg(); load(pg);
</script>
</body>
</html>
